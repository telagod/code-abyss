<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#0e0e18"/>
      <stop offset="100%" stop-color="#070710"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#9b8cff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9b8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.7" r="0.5">
      <stop offset="0%" stop-color="#6e5dff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6e5dff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iris" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b8ff"/>
      <stop offset="50%" stop-color="#9b8cff"/>
      <stop offset="100%" stop-color="#5544cc"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0a0a12" stop-opacity="0.96"/>
      <stop offset="70%" stop-color="#0a0a12" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a0a12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ecedf5"/>
      <stop offset="100%" stop-color="#c4b8ff"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <rect width="1200" height="360" fill="url(#glow1)"/>
  <rect width="1200" height="360" fill="url(#glow2)"/>

  <!-- left: logo mark (large) with 4 arcs for v4 -->
  <g transform="translate(80, 80)">
    <!-- outer ring with cut -->
    <path d="M100 10 A90 90 0 1 1 28 174.3" stroke="url(#iris)" stroke-width="6" stroke-linecap="round"/>
    <!-- four arcs: voice · style · skills · kernel -->
    <path d="M60 78 A40 40 0 0 1 140 78" stroke="url(#iris)" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M70 100 A30 30 0 0 1 130 100" stroke="url(#iris)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M80 122 A20 20 0 0 1 120 122" stroke="url(#iris)" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M88 142 A12 12 0 0 1 112 142" stroke="url(#iris)" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <!-- abyss core -->
    <circle cx="100" cy="100" r="90" fill="url(#core)"/>
  </g>

  <!-- right: title + tagline + version chip -->
  <g transform="translate(330, 105)">
    <!-- version chip -->
    <g>
      <rect x="0" y="0" width="365" height="30" rx="15" fill="rgba(155,140,255,0.10)" stroke="rgba(155,140,255,0.30)"/>
      <circle cx="22" cy="15" r="9" fill="#9b8cff"/>
      <text x="22" y="20" text-anchor="middle" font-family="Georgia, 'Noto Serif SC', serif" font-size="13" font-weight="700" fill="#0a0a12">v</text>
      <text x="42" y="20" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="13" font-weight="600" fill="#9b8cff" letter-spacing="0.5">4.9 — Mythos Discipline Kernel</text>
    </g>

    <!-- title -->
    <text x="0" y="100" font-family="Georgia, 'Noto Serif SC', serif" font-size="78" font-weight="600" fill="url(#title-grad)" letter-spacing="-2.5">Code Abyss</text>

    <!-- tagline -->
    <text x="2" y="148" font-family="Georgia, 'Noto Serif SC', serif" font-size="26" font-style="italic" font-weight="500" fill="#9b8cff" letter-spacing="-0.5">Personality, depth, and a security spine.</text>
    <text x="2" y="180" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="15" fill="rgba(236,237,245,0.55)" letter-spacing="0.2">30 domain skills · discipline kernel · 4 native security domains · 4 platforms</text>

    <!-- platform chips -->
    <g transform="translate(0, 210)" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="12" font-weight="500">
      <g>
        <rect x="0" y="0" width="92" height="26" rx="13" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
        <text x="46" y="17" text-anchor="middle" fill="rgba(236,237,245,0.75)">Claude Code</text>
      </g>
      <g transform="translate(102, 0)">
        <rect x="0" y="0" width="80" height="26" rx="13" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
        <text x="40" y="17" text-anchor="middle" fill="rgba(236,237,245,0.75)">Codex CLI</text>
      </g>
      <g transform="translate(192, 0)">
        <rect x="0" y="0" width="84" height="26" rx="13" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
        <text x="42" y="17" text-anchor="middle" fill="rgba(236,237,245,0.75)">Gemini CLI</text>
      </g>
      <g transform="translate(286, 0)">
        <rect x="0" y="0" width="74" height="26" rx="13" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
        <text x="37" y="17" text-anchor="middle" fill="rgba(236,237,245,0.75)">OpenClaw</text>
      </g>
    </g>
  </g>
</svg>
